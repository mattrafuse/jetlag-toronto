<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetlag Map</title>
    <link rel="icon" type="image/webp" href="static/favicon.webp" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      #map {
        height: 100%;
        width: 100%;
      }

      #app-overlay {
        position: fixed;
        top: 0;
        bottom: 0;
        right: 0;
        z-index: 400;
      }

      .station-label {
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 10px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: none;
      }

      .station-label::before {
        display: none;
      }

      /* Hide all station name labels when the setting is off. Driven by a
         class on the map container so it applies to markers added
         asynchronously by esri-leaflet featureLayers. */
      .leaflet-container.hide-station-labels .station-label {
        display: none;
      }

      /* Dark mode: restyle station labels and Leaflet zoom controls */
      .leaflet-container.dark-mode .station-label {
        background: rgba(255, 255, 255, 0.85);
        color: #111;
      }

      .leaflet-container.dark-mode .leaflet-control-zoom a {
        background-color: #2b2b2b;
        color: #f0f0f0;
        border-color: #444;
      }

      .leaflet-container.dark-mode .leaflet-control-zoom a:hover {
        background-color: #3a3a3a;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="app-overlay"></div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
